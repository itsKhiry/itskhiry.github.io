<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khiry Hewitt</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 {
            margin: 10px 0;
            font-size: 24px;
        }
        p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .links a {
            display: inline-block;
            margin: 5px;
            text-decoration: none;
            color: white;
            background: #333;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
        }

        .links a:hover {
            background: #555;
        }
    </style>
</head>

<body>

    <div class="card">
        <!-- Replace with your image -->
        <img src="khiry.png" alt="Khiry" class="profile-img">

        <h1>Khiry Hewitt</h1>
        <p>Strong Technical Skills | Strong Human Skills</p>

        <div class="links">
            <a href="mailto:khiryhewitt@gmail.com">Email</a>
            <a href="https://www.linkedin.com/in/khiryhewitt/">LinkedIn</a>
            <a href="tel:+64276334231">Phone</a>
        </div>
    </div>

</body>
</html>
